<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page en maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#0d1f35;
  --text:#ffffff;
  --sub:rgba(255,255,255,.35);
  --accent:#4d8fc4;
  --ctrl-bg:rgba(255,255,255,.08);
  --ctrl-border:rgba(255,255,255,.12);
  --ctrl-text:rgba(255,255,255,.6);
}

[data-theme="light"] {
  --bg:#f0f5fb;
  --text:#1c2b3a;
  --sub:rgba(28,43,58,.4);
  --accent:#2c6fad;
  --ctrl-bg:rgba(255,255,255,.75);
  --ctrl-border:rgba(44,111,173,.18);
  --ctrl-text:#4a5e72;
}

body {
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .35s;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── CONTROLS ── */
.controls {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 10;
  display: flex;
  gap: .5rem;
}

.btn-ctrl {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  background: var(--ctrl-bg);
  border: 1px solid var(--ctrl-border);
  border-radius: 2rem;
  padding: .38rem .85rem;
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  font-weight: 600;
  color: var(--ctrl-text);
  cursor: pointer;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: background .2s, color .2s, border-color .2s;
  letter-spacing: .03em;
}
.btn-ctrl:hover {
  background: rgba(77,143,196,.2);
  color: var(--accent);
  border-color: var(--accent);
}

.lang-opt { opacity: .4; transition: opacity .2s; }
.lang-opt.active { opacity: 1; color: var(--accent); }
.lang-sep { opacity: .25; }

/* ── MAIN TEXT ── */
.content {
  position: relative;
  z-index: 1;
  text-align: center;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(3rem, 9vw, 8rem);
  font-style: italic;
  color: var(--text);
  letter-spacing: -.02em;
  line-height: 1.1;
  text-shadow: 0 0 80px rgba(77,143,196,.35), 0 2px 40px rgba(0,0,0,.15);
  animation: fadeIn 1.4s cubic-bezier(.16,1,.3,1) both;
  transition: color .35s, text-shadow .35s;
}

h1 .sub {
  display: block;
  font-size: clamp(.75rem, 2vw, 1rem);
  font-style: normal;
  color: var(--sub);
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  text-shadow: none;
  transition: color .35s;
}

h1 em { color: var(--accent); }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="controls">
  <button class="btn-ctrl btn-lang" id="btnLang" aria-label="Switch language">
    <span class="lang-opt active" id="langFR">FR</span>
    <span class="lang-sep">/</span>
    <span class="lang-opt" id="langEN">EN</span>
  </button>
  <button class="btn-ctrl" id="btnTheme" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Jour</span>
  </button>
</div>

<div class="content">
  <h1>
    <span class="sub" id="lblSub">Site web</span>
    <span id="lblMain">Page en<br><em>maintenance</em></span>
  </h1>
</div>

<script>
/* ─── i18n ─── */
const i18n = {
  fr: { sub: 'Site web', main: 'Page en<br><em>maintenance</em>', themeLight: 'Jour', themeDark: 'Nuit' },
  en: { sub: 'Website',  main: 'Under<br><em>maintenance</em>',   themeLight: 'Day',  themeDark: 'Night' },
};

let lang = 'fr';
let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

function applyTheme(t) {
  theme = t;
  const isDark = t === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isDark ? i18n[lang].themeLight : i18n[lang].themeDark;
}

function applyLang(l) {
  lang = l;
  const t = i18n[l];
  document.documentElement.lang = l;
  document.getElementById('lblSub').textContent = t.sub;
  document.getElementById('lblMain').innerHTML = t.main;
  const isDark = theme === 'dark';
  document.getElementById('themeLabel').textContent = isDark ? t.themeLight : t.themeDark;
  document.getElementById('langFR').classList.toggle('active', l === 'fr');
  document.getElementById('langEN').classList.toggle('active', l === 'en');
}

applyTheme(theme);
applyLang('fr');

document.getElementById('btnTheme').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
document.getElementById('btnLang').addEventListener('click', () => applyLang(lang === 'fr' ? 'en' : 'fr'));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => applyTheme(e.matches ? 'dark' : 'light'));

/* ─── CANVAS ─── */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, nodes = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

class Node {
  constructor() {
    this.x = Math.random() * W; this.y = Math.random() * H;
    this.vx = (Math.random() - .5) * .3; this.vy = (Math.random() - .5) * .3;
    this.r = Math.random() * 2 + 1;
    this.alpha = Math.random() * .5 + .2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  }
}

function init() { resize(); nodes = []; for (let i = 0; i < 60; i++) nodes.push(new Node()); }

function loop() {
  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 150) {
        ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(44,111,173,${(.15 * (1 - d/150)).toFixed(3)})`;
        ctx.lineWidth = .8; ctx.stroke();
      }
    }
  }
  nodes.forEach(n => {
    n.update();
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(77,143,196,${n.alpha})`; ctx.fill();
  });
  requestAnimationFrame(loop);
}

window.addEventListener('resize', init);
init(); loop();
</script>
</body>
</html>
